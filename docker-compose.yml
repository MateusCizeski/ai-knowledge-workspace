version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: workspace_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: workspace
      POSTGRES_PASSWORD: workspace123
      POSTGRES_DB: ai_workspace
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workspace -d ai_workspace"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: workspace_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://workspace:workspace123@postgres:5432/ai_workspace
      JWT_SECRET: super_secret_jwt_key_change_in_production
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/backend/src:/app/src
    command: npm run dev

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: workspace_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    depends_on:
      - backend
    volumes:
      - ./apps/frontend/src:/app/src

volumes:
  pgdata:
    name: workspace_pgdata
