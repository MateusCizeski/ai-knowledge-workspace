[build]
builder = "nixpacks"
buildCommand = "cd apps/backend && npm install && npx prisma generate --schema=prisma/schema.prisma"

[deploy]
startCommand = "cd apps/backend && npx prisma migrate deploy --schema=prisma/schema.prisma && node dist/server.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[environments.production]
NODE_ENV = "production"